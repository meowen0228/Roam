version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: chat_platform
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: go-backend
    restart: always
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: chat_user
      DB_PASSWORD: userpassword
      DB_NAME: chat_platform
    ports:
      - "8080:8080"
    networks:
      - backend_network

volumes:
  db_data:

networks:
  backend_network:
    driver: bridge
